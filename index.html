<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamed — Apprendre l'hébreu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 16px; font-weight: 600; color: #2c2c2a; display: flex; align-items: center; gap: 8px; }
    .logo-he { font-size: 18px; color: #888; }
    .nav-pills { display: flex; gap: 4px; }
    .pill {
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .pill.active { background: #f0f0ee; color: #2c2c2a; font-weight: 500; }

    /* LAYOUT PRINCIPAL */
    .layout {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
      gap: 20px;
      transition: all 0.3s ease;
    }

    /* ZONE PRINCIPALE */
    .main {
      flex: 1;
      min-width: 0;
      transition: all 0.3s ease;
    }

    /* CARTE SAISIE */
    .input-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .input-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      height: 110px;
      font-size: 20px;
      padding: 12px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      direction: rtl;
      font-family: Arial, sans-serif;
      resize: vertical;
      background: #fafafa;
      color: #2c2c2a;
    }
    textarea:focus { outline: none; border-color: #bbb; }
    .btn-row { display: flex; justify-content: flex-end; margin-top: 12px; }
    .btn-primary {
      font-size: 13px;
      padding: 8px 18px;
      background: #2c2c2a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary:hover { background: #444; }

    /* TEXTE CLIQUABLE */
    .text-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 28px;
      display: none;
    }
    .text-card.visible { display: block; }
    .text-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.btn-secondary {
  font-size: 13px;
  padding: 7px 14px;
  background: white;
  color: #2c2c2a;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
}
.btn-secondary:hover { background: #f5f5f3; }
.translation-text {
  font-size: 17px;
  line-height: 1.9;
  color: #2c2c2a;
  display: none;
}
.translation-text.visible { display: block; }
    .he-text {
      direction: rtl;
      font-size: 22px;
      line-height: 2.4;
      color: #2c2c2a;
    }
    .word {
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      display: inline-block;
      transition: background 0.15s;
    }
    .word:hover { background: #faeeda; }
    .word.active {
      background: #faeeda;
      border-bottom: 2px solid #ba7517;
    }

    /* PANNEAU LATÉRAL */
    .side-panel {
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  flex-shrink: 0;
}
    .side-panel.open {
      width: 320px;
    }
    .panel-card {
  background: white;
  border: 1px solid #e8e8e8;
  border-radius: 12px;
  padding: 24px;
  width: 320px;
  position: fixed;
  top: 60px;
  right: 20px;
  bottom: 20px;
  overflow-y: auto;
}
    .panel-close {
  position: absolute;
  top: 12px;
  left: 12px;
  font-size: 20px;
  color: white;
  cursor: pointer;
  background: #2c2c2a;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.panel-close:hover { background: #444; }
    .panel-card { position: relative; }

    .panel-he {
      font-size: 30px;
      direction: rtl;
      text-align: right;
      color: #2c2c2a;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .panel-fr {
      font-size: 17px;
      color: #185fa5;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      background: #eef4fb;
      color: #185fa5;
    }
    .divider { height: 1px; background: #f0f0ee; margin: 14px 0; }
    .panel-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .panel-val {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .panel-loading {
      color: #aaa;
      font-size: 14px;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    /* CLÉ API */
    .api-bar {
      background: #fffdf0;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .api-bar label { font-size: 12px; color: #aaa; white-space: nowrap; }
    .api-bar input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      font-size: 13px;
      min-width: 180px;
      background: white;
    }

    /* RESPONSIVE */
    @media (max-width: 700px) {
  .layout { flex-direction: column; padding: 16px; }
  .side-panel {
    position: fixed;
    top: 0; left: 0;
    width: 100% !important;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 50;
    overflow: hidden;
    display: none;
  }
  .side-panel.open {
    display: flex;
    align-items: flex-end;
  }
  .panel-card {
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 16px 16px 0 0;
    position: static;
    border-bottom: none;
  }
}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="logo-he">לָמַד</span>
    <span>Lamed</span>
  </div>
  <div class="nav-pills">
    <button class="pill active">Lire</button>
    <button class="pill">Historique</button>
    <button class="pill">Exercices</button>
  </div>
</div>

<div class="layout" id="layout">

  <div class="main">



    <!-- Zone de saisie — disparaît après analyse -->
    <div class="input-card" id="inputCard">
      <div class="input-label">Colle ton texte hébreu</div>
      <textarea id="input" placeholder="הדבק כאן טקסט בעברית..."></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="afficherTexte()">Analyser ▶</button>
      </div>
    </div>

    <!-- Texte cliquable — remplace la saisie -->
    <div class="text-card" id="textCard">
  <div class="text-toolbar">
    <button class="btn-secondary" id="btnTraduction" onclick="basculerTraduction()">Traduction</button>
    <button class="btn-secondary" onclick="nouveauTexte()">Nouveau texte</button>
  </div>
  <div class="he-text" id="output"></div>
  <div class="translation-text" id="translationText"></div>
</div>

  </div>

  <!-- Panneau latéral -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-card">
      <button class="panel-close" onclick="fermerPanel()">✕</button>
      <div class="panel-he" id="panel-mot"></div>
      <div class="panel-fr" id="panel-traduction"></div>
      <div class="badges" id="panel-badges"></div>
      <div class="divider"></div>
      <div id="panel-contenu"></div>
    </div>
  </div>

</div>

<script>
  let motActif = null;

  function afficherTexte() {
    const texte = document.getElementById('input').value.trim();
    if (!texte) return;

    // Nettoie les niqqoud
    const textePropre = texte.replace(/[\u0591-\u05C7]/g, '');
    const mots = textePropre.split(/\s+/);

    const output = document.getElementById('output');
    output.innerHTML = mots.map(mot =>
      `<span class="word" onclick="traduire(this, '${mot.replace(/'/g, "\\'")}')">${mot}</span>`
    ).join(' ');

    // Remplace la zone de saisie par le texte cliquable
    document.getElementById('inputCard').style.display = 'none';
    document.getElementById('textCard').classList.add('visible');
  }

  async function traduire(el, mot) {
    if (motActif) motActif.classList.remove('active');
    motActif = el;
    el.classList.add('active');

    // Ouvre le panneau
    document.getElementById('panel-mot').textContent = mot;
    document.getElementById('panel-traduction').textContent = '';
    document.getElementById('panel-badges').innerHTML = '';
    document.getElementById('panel-contenu').innerHTML = '<div class="panel-loading">Analyse en cours...</div>';
    document.getElementById('sidePanel').classList.add('open');

    const texteComplet = document.getElementById('output').innerText;

    try {
      const response = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mot, texte: texteComplet, type: 'mot' })
      });

      const data = await response.json();
      const texteReponse = data.content[0].text.replace(/```json|```/g, '').trim();
      const json = JSON.parse(texteReponse);

      document.getElementById('panel-traduction').textContent = json.traduction;

      document.getElementById('panel-badges').innerHTML = json.badges
        .map(b => `<span class="badge">${b}</span>`).join('');

      document.getElementById('panel-contenu').innerHTML = `
        <div class="panel-label">Racine</div>
        <div class="panel-val">${json.racine}</div>
        <div class="panel-label">Analyse</div>
        <div class="panel-val">${json.analyse}</div>
      `;

    } catch (err) {
      document.getElementById('panel-contenu').innerHTML =
        `<div class="panel-loading">❌ Erreur : ${err.message}</div>`;
    }
  }
let traductionChargee = false;
let modeTraduction = false;

async function basculerTraduction() {
  const btn = document.getElementById('btnTraduction');
  const output = document.getElementById('output');
  const translationText = document.getElementById('translationText');

  if (!modeTraduction) {
    // Passe en mode traduction
    modeTraduction = true;
    btn.textContent = 'Original';
    output.style.display = 'none';
    fermerPanel();

    if (!traductionChargee) {
      translationText.classList.add('visible');
      translationText.innerHTML = '<em style="color:#aaa">Traduction en cours...</em>';

      const texteHebreu = output.innerText;
      try {
        const response = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texte: texteHebreu, type: 'traduction_complete' })
        });

        const data = await response.json();
        translationText.innerHTML = data.content[0].text;
        traductionChargee = true;

      } catch (err) {
        translationText.innerHTML = `<em style="color:red">Erreur : ${err.message}</em>`;
      }

    } else {
      translationText.classList.add('visible');
    }

  } else {
    // Revient à l'original
    modeTraduction = false;
    btn.textContent = 'Traduction';
    output.style.display = 'block';
    translationText.classList.remove('visible');
  }
}

function nouveauTexte() {
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('textCard').classList.remove('visible');
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('translationText').innerHTML = '';
  traductionChargee = false;
  modeTraduction = false;
  document.getElementById('btnTraduction').textContent = 'Traduction';
  fermerPanel();
}
  function fermerPanel() {
    document.getElementById('sidePanel').classList.remove('open');
    if (motActif) motActif.classList.remove('active');
    motActif = null;
  }
</script>

</body>
</html>
